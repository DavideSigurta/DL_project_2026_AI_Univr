experiment:
  name: "dann_resnet18"
  seed: 42
  device: "auto"

data:
  task: "dann"
  source_csv: "data/processed/isic2018/train.csv"
  target_csv: "data/processed/isic2020/train.csv"
  val_csv: "data/processed/isic2018/val.csv"
  img_size: 224
  batch_size: 64
  num_workers: 0    # intentionally 0 — DomainDataset + fork safety on macOS
  include_target_labels: false
  label_col: "target"
  max_target_samples: 4000
  balanced_domains: true

model:
  arch: "resnet18"
  pretrained: true
  num_classes: 1

training:
  epochs: 50
  optimizer: "adamw"
  lr_backbone: 1.0e-4
  lr_head: 1.0e-3
  lr_domain: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  freeze_backbone_epochs: 0

loss:
  type: "focal"
  gamma: 2.0
  alpha: 0.75

da:
  lambda_schedule: "dann"
  lambda_max: 0.3
  use_coral: false

early_stopping:
  patience: 10
  monitor: "val_auc"

logging:
  save_dir: "results/runs"
