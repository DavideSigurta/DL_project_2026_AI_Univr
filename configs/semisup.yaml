experiment:
  name: "mean_teacher_resnet18"
  seed: 42
  device: "auto"

data:
  task: "mean_teacher"
  labeled_csv: "data/processed/isic2018/train.csv"
  unlabeled_csv: "data/processed/isic2020/train.csv"
  val_csv: "data/processed/isic2018/val.csv"
  img_size: 224
  batch_size: 64
  num_workers: 4
  unlabeled_ratio: 3.0
  label_col: "target"

model:
  arch: "resnet18"
  pretrained: true
  num_classes: 1

training:
  epochs: 50
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 1.0e-4

semisup:
  ema_decay: 0.999
  consistency_weight: 10.0
  rampup_epochs: 10

logging:
  save_dir: "results/runs"
