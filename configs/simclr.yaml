experiment:
  name: "simclr_resnet18"
  seed: 42
  device: "auto"

data:
  task: "simclr"
  train_csv: "data/processed/combined_unlabeled.csv"
  img_size: 224
  batch_size: 256
  num_workers: 4

model:
  arch: "resnet18"
  pretrained: true
  projection_dim: 128
  projection_hidden_dim: 512

ssl:
  temperature: 0.07
  epochs: 100
  optimizer: "adamw"
  lr: 3.0e-4
  weight_decay: 1.0e-4
  save_every: 10
  save_best: true

finetune:
  epochs: 30
  optimizer: "adamw"
  lr_backbone: 1.0e-4
  lr_head: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  freeze_backbone_epochs_low: 5    # fractions <= 0.05
  freeze_backbone_epochs_high: 0   # fractions > 0.05
  loss:
    type: "focal"
    gamma: 2.0
    alpha: 0.75
  early_stopping:
    monitor: "val_auc"
    patience: 7
    min_delta: 0.0

logging:
  save_dir: "results/runs"